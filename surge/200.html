<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalCamera NET Viewer</title>
  <meta name="description" content="Realtime camera streaming viewer">
  <meta name="version" content="2026032418">
  
  <!-- Cache control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <!-- Auto-refresh every 5 minutes -->
  <meta http-equiv="refresh" content="300">
  
  <!-- Service Worker for cache busting -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
    
    // Force a network-fresh load on every entry while keeping a clean URL.
    (function() {
      const cacheBustParam = '__lcv';
      const currentUrl = new URL(window.location.href);

      if (currentUrl.searchParams.has(cacheBustParam)) {
        currentUrl.searchParams.delete(cacheBustParam);
        const cleanQuery = currentUrl.searchParams.toString();
        const cleanUrl =
          currentUrl.pathname +
          (cleanQuery ? `?${cleanQuery}` : '') +
          currentUrl.hash;
        window.history.replaceState(null, '', cleanUrl);
        return;
      }

      const freshUrl = new URL(window.location.href);
      freshUrl.searchParams.set(cacheBustParam, Date.now().toString(36));
      window.location.replace(freshUrl.toString());
    })();
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #070d14;
      --bg-soft: #0f1823;
      --ice: #e8f5ff;
      --slate: #9db0c1;
      --accent: #4f8fff;
      --live: #4dd88a;
      --warn: #f9c34b;
      --record: #e2515a;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, var(--bg-soft), var(--bg));
      color: var(--ice);
      overflow: hidden;
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at 30% 15%, #102033, var(--bg));
      --video-left: 0px;
      --video-right: 0px;
      --video-top: 0px;
      --video-bottom: 0px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #02060b;
      transition: filter 0.18s ease;
    }

    .viewer.autoplay-gate #video,
    .viewer.state-blurred #video {
      filter: blur(8px) brightness(0.62);
    }

    .status-pill {
      display: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 10, 16, 0.52);
      transition: opacity 0.3s ease;
      z-index: 2;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-content {
      text-align: center;
      padding: 32px 20px;
      max-width: 420px;
    }

    .overlay-title {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: var(--ice);
    }

    .overlay-text {
      font-size: 15px;
      color: rgba(232, 245, 255, 0.76);
      margin: 0;
      line-height: 1.45;
    }

    .overlay-play-btn {
      margin-top: 16px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(7, 13, 20, 0.72);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.14s ease;
    }

    .overlay-play-btn:hover {
      transform: scale(1.04);
      background: rgba(17, 28, 45, 0.82);
    }

    .overlay-play-btn.hidden {
      display: none;
    }

    .overlay.autoplay-prompt .overlay-title,
    .overlay.autoplay-prompt .overlay-text {
      display: none;
    }

    .overlay.autoplay-prompt .overlay-content {
      max-width: none;
      padding: 0;
    }

    .audio-sink {
      display: none;
    }

    .controls {
      position: absolute;
      left: var(--video-left);
      right: var(--video-right);
      bottom: calc(var(--video-bottom) + 12px);
      z-index: 3;
      pointer-events: none;
    }

    .viewer.obs-browser-source .controls,
    .viewer.obs-browser-source .volume-panel,
    .viewer.obs-browser-source .settings-menu {
      display: none !important;
    }

    .controls-left,
    .controls-center,
    .controls-right {
      position: absolute;
      bottom: 0;
      pointer-events: auto;
    }

    .controls-left {
      left: 22px;
    }

    .controls-center {
      left: 50%;
      transform: translateX(-50%);
    }

    .controls-right {
      right: 22px;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.94);
      cursor: pointer;
      padding: 0;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
      transition: color 0.18s ease, opacity 0.18s ease;
    }

    .control-btn:hover,
    .control-btn.active {
      color: var(--accent);
    }

    #playPauseBtn {
      color: rgba(255, 255, 255, 0.95);
    }

    #playPauseBtn.active {
      color: var(--record);
    }

    .volume-panel,
    .settings-menu {
      position: absolute;
      opacity: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: auto;
      z-index: 4;
    }

    .volume-panel.hidden,
    .settings-menu.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .volume-panel {
      left: calc(var(--video-left) + 58px);
      bottom: calc(var(--video-bottom) + 14px);
      width: 168px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      transform-origin: left center;
      background: transparent;
      border: 0;
      border-radius: 0;
      backdrop-filter: none;
      transform: translateX(0);
    }

    .volume-panel.hidden {
      transform: translateX(-10px);
    }

    .volume-slider {
      width: 100%;
      height: 4px;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) 80%,
        rgba(255, 255, 255, 0.85) 80%,
        rgba(255, 255, 255, 0.85) 100%
      );
      border-radius: 999px;
      outline: none;
      color: var(--accent);
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.35);
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.35);
    }

    .settings-menu {
      right: calc(var(--video-right) + 16px);
      bottom: calc(var(--video-bottom) + 62px);
      min-width: 260px;
      padding: 0;
      background: transparent;
      backdrop-filter: none;
      border-radius: 0;
      box-shadow: none;
      transform-origin: bottom right;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 14px;
      align-items: start;
    }

    .settings-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(177, 181, 191, 0.46);
    }

    .menu-section {
      min-width: 0;
    }

    .menu-title {
      margin: 0 0 12px 0;
      color: rgba(177, 181, 191, 0.9);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .menu-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-option {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.92);
      padding: 0;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.25;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.68);
      transition: color 0.18s ease;
    }

    .menu-option:hover,
    .menu-option.active {
      color: var(--accent);
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .settings-menu {
        right: 10px;
        left: 10px;
        min-width: 0;
      }

      .settings-grid {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="viewer">
    <video id="video" autoplay playsinline></video>
    <audio id="audio" class="audio-sink" autoplay playsinline></audio>
    
    <div id="statusPill" class="status-pill waiting">Waiting</div>
    
    <div id="overlay" class="overlay">
      <div class="overlay-content">
        <h1 id="overlayTitle" class="overlay-title">Waiting for stream</h1>
        <p id="overlayText" class="overlay-text">Open the exact link shared by the app.</p>
        <button id="overlayPlayBtn" class="overlay-play-btn hidden" type="button" title="Play">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>
      </div>
    </div>

    <div id="controls" class="controls">
      <div class="controls-left">
        <button id="muteBtn" class="control-btn" type="button" title="Volume">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path id="muteIcon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
      </div>
      <div class="controls-center">
        <button id="playPauseBtn" class="control-btn" type="button" title="Play/Pause">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path id="playPauseIcon" d="M8 5v14l11-7z"/>
          </svg>
        </button>
      </div>
      <div class="controls-right">
        <button id="settingsBtn" class="control-btn" type="button" title="Quality">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 5h18v2H3zm4 6h14v2H7zm-4 6h18v2H3z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="volumePanel" class="volume-panel hidden">
      <input id="volumeSlider" class="volume-slider" type="range" min="0" max="100" value="80">
    </div>

    <div id="settingsMenu" class="settings-menu hidden">
      <div class="settings-grid">
        <div class="menu-section">
          <div class="menu-title">Resolution</div>
          <div class="menu-options" id="qualityOptions">
            <button class="menu-option" data-quality="auto">Auto</button>
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="menu-section">
          <div class="menu-title">Bitrate</div>
          <div class="menu-options" id="bitrateOptions">
            <button class="menu-option" data-bitrate="auto">Auto</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/gh/Afflik/cloudcam@8174e8b/viewer-core.js"></script>
</body>
</html>
